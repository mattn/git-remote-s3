name: Release

on:
  push:
    tags:
    - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: stable
    - name: Cross build
      run: make cross
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: goxz/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
